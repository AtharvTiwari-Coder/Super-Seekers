<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>MAP_1-SET_1 — Touch-only Collision</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      #mapCanvas {
        position: absolute;
        left: 0;
        top: 0;
        image-rendering: pixelated;
        z-index: 5;
        transform-origin: 0 0;
        will-change: transform;
      }
      #triangle-seeker {
        position: absolute;
        width: 0;
        height: 0;
        border-left: 20px solid transparent;
        border-right: 20px solid transparent;
        border-bottom: 32px solid #ff4d4d;
        filter: drop-shadow(0 0 1px #000) drop-shadow(0 0 4px #ff4d4d)
          drop-shadow(0 0 8px #ff4d4d);
        transform: translate(-50%, -50%) rotate(0deg) scale(1);
        transition: transform 0.12s linear;
        pointer-events: none;
        z-index: 50;
        will-change: transform, left, top;
      }
      #triangle-seeker::after {
        content: "";
        position: absolute;
        top: -5px;
        left: -2px;
        width: 4px;
        height: 6px;
        background: #000;
        border-radius: 50%;
      }
      .compass-seeker {
        position: fixed;
        top: 20px;
        right: 20px;
        width: 80px;
        height: 80px;
        border: 2px solid #ff4d4d;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #ff4d4d;
        font-family: monospace;
        font-size: 12px;
        box-shadow: 0 0 10px #ff4d4d;
        z-index: 60;
      }
      .coords-seeker {
        position: fixed;
        bottom: 20px;
        left: 20px;
        color: #ff4d4d;
        font-family: monospace;
        font-size: 13px;
        text-shadow: 0 0 6px #ff4d4d;
        z-index: 60;
      }
      .trail-seeker {
        position: absolute;
        width: 0;
        height: 0;
        border-left: 20px solid transparent;
        border-right: 20px solid transparent;
        border-bottom: 32px solid #ff4d4d;
        filter: drop-shadow(0 0 1px #000) drop-shadow(0 0 4px #ff4d4d)
          drop-shadow(0 0 8px #ff4d4d);
        opacity: 0.6;
        transform: translate(-50%, -50%);
        animation: fadeOutSeeker 0.5s forwards;
        pointer-events: none;
        z-index: 40;
      }
      @keyframes fadeOutSeeker {
        to {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.9);
        }
      }
    </style>
  </head>
  <body>
    <canvas id="mapCanvas"></canvas>
    <div id="triangle-seeker"></div>
    <div class="compass-seeker">UP</div>
    <div class="coords-seeker">X: 0, Y: 0</div>

    <script>
      const TILE = 16;
      const RADIUS = 6;
      const SEEKER_WIDTH = 40;
      const SEEKER_HEIGHT = 32;
      const SEEKER_SPEED = 3.5;
      const VISUAL_SCALE_X = 1.12;

      const SCROLL_TRIGGER_X = 80;
      const SCROLL_TRIGGER_Y = 500;
      const SCROLL_AMOUNT = 120;
      const SCROLL_LERP = 0.12;

      // collision buffer kept at 0 so only actual overlap blocks movement
      const COLLISION_BUFFER = 0;

      const PREFER_COLS = 8;
      const PREFER_ROWS = 8;

      const canvas = document.getElementById("mapCanvas");
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = false;
      ctx.lineJoin = "round";
      ctx.strokeStyle = "#000";
      ctx.lineWidth = 1;

      const triangleSeeker = document.getElementById("triangle-seeker");
      const compassSeeker = document.querySelector(".compass-seeker");
      const coordsSeeker = document.querySelector(".coords-seeker");

      const img = new Image();
      img.src = "MAP_1-SET_1.png"; // update path if needed

      const keys = {
        arrowup: false,
        arrowdown: false,
        arrowleft: false,
        arrowright: false,
        w: false,
        a: false,
        s: false,
        d: false,
      };

      let posX = 0,
        posY = 0;
      let lastRotation = 0;
      let collision = [];
      let mapCols = 0,
        mapRows = 0;
      let scrollY = 0,
        targetScrollY = 0;

      function buildCollisionGrid(image, tileSize = TILE) {
        const off = document.createElement("canvas");
        off.width = image.width;
        off.height = image.height;
        const offCtx = off.getContext("2d");
        offCtx.drawImage(image, 0, 0);
        const data = offCtx.getImageData(0, 0, image.width, image.height).data;

        const cols = Math.floor(image.width / tileSize);
        const rows = Math.floor(image.height / tileSize);
        const grid = new Array(rows);
        for (let y = 0; y < rows; y++) {
          grid[y] = new Array(cols).fill(0);
          for (let x = 0; x < cols; x++) {
            let yellow = 0,
              total = 0;
            for (let ty = 0; ty < tileSize; ty++) {
              for (let tx = 0; tx < tileSize; tx++) {
                const px =
                  (y * tileSize + ty) * image.width + (x * tileSize + tx);
                const r = data[px * 4],
                  g = data[px * 4 + 1],
                  b = data[px * 4 + 2];
                if (r > 200 && g > 200 && b < 100) yellow++;
                total++;
              }
            }
            grid[y][x] = yellow / total > 0.3 ? 1 : 0;
          }
        }
        return { grid, cols, rows };
      }

      function isWallAt(grid, tx, ty) {
        if (!grid) return false;
        if (ty < 0 || ty >= grid.length) return false;
        if (tx < 0 || tx >= grid[0].length) return false;
        return grid[ty][tx] === 1;
      }

      function drawTileWithCornerRounding(
        grid,
        tx,
        ty,
        size = TILE,
        radius = RADIUS,
      ) {
        const x = tx * size;
        const y = ty * size;
        const up = isWallAt(grid, tx, ty - 1);
        const down = isWallAt(grid, tx, ty + 1);
        const left = isWallAt(grid, tx - 1, ty);
        const right = isWallAt(grid, tx + 1, ty);

        const roundTL = !up && !left;
        const roundTR = !up && !right;
        const roundBR = !down && !right;
        const roundBL = !down && !left;

        ctx.beginPath();
        if (roundTL) ctx.moveTo(x + radius, y);
        else ctx.moveTo(x, y);
        if (roundTR) ctx.lineTo(x + size - radius, y);
        else ctx.lineTo(x + size, y);
        if (roundTR) ctx.quadraticCurveTo(x + size, y, x + size, y + radius);
        if (roundBR) ctx.lineTo(x + size, y + size - radius);
        else ctx.lineTo(x + size, y + size);
        if (roundBR)
          ctx.quadraticCurveTo(x + size, y + size, x + size - radius, y + size);
        if (roundBL) ctx.lineTo(x + radius, y + size);
        else ctx.lineTo(x, y + size);
        if (roundBL) ctx.quadraticCurveTo(x, y + size, x, y + size - radius);
        if (roundTL) ctx.lineTo(x, y + radius);
        else ctx.lineTo(x, y);
        if (roundTL) ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();

        ctx.fill();
        ctx.stroke();
      }

      function drawMazeGrid(grid) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "royalblue";
        for (let y = 0; y < grid.length; y++) {
          for (let x = 0; x < grid[y].length; x++) {
            if (grid[y][x] === 1)
              drawTileWithCornerRounding(grid, x, y, TILE, RADIUS);
          }
        }
      }

      function createTrail(xLogical, yLogical, rotation) {
        const trail = document.createElement("div");
        trail.className = "trail-seeker";
        trail.style.left = xLogical * VISUAL_SCALE_X + "px";
        trail.style.top = yLogical - scrollY + "px";
        trail.style.transform = `translate(-50%,-50%) rotate(${rotation}deg)`;
        document.body.appendChild(trail);
        setTimeout(() => trail.remove(), 520);
      }

      function clampToCanvas(px, py) {
        const halfW = SEEKER_WIDTH / 2,
          halfH = SEEKER_HEIGHT / 2;
        const minX = halfW,
          minY = halfH;
        const maxX = canvas.width - halfW,
          maxY = canvas.height - halfH;
        return {
          x: Math.max(minX, Math.min(maxX, px)),
          y: Math.max(minY, Math.min(maxY, py)),
        };
      }

      // Touch-only collision: return true only if seeker bounding box has positive-area overlap with any wall tile
      function isTouchingWall(px, py) {
        const halfW = SEEKER_WIDTH / 2;
        const halfH = SEEKER_HEIGHT / 2;
        // bounding box of seeker in pixel coordinates
        const bx0 = px - halfW - COLLISION_BUFFER;
        const by0 = py - halfH - COLLISION_BUFFER;
        const bx1 = px + halfW + COLLISION_BUFFER;
        const by1 = py + halfH + COLLISION_BUFFER;

        // determine tile range that bbox intersects
        const tx0 = Math.floor(Math.max(0, Math.floor(bx0 / TILE)));
        const ty0 = Math.floor(Math.max(0, Math.floor(by0 / TILE)));
        const tx1 = Math.floor(Math.min(mapCols - 1, Math.floor(bx1 / TILE)));
        const ty1 = Math.floor(Math.min(mapRows - 1, Math.floor(by1 / TILE)));

        for (let ty = ty0; ty <= ty1; ty++) {
          for (let tx = tx0; tx <= tx1; tx++) {
            if (collision[ty][tx] === 1) {
              // tile rectangle
              const tx0px = tx * TILE;
              const ty0px = ty * TILE;
              const tx1px = tx0px + TILE;
              const ty1px = ty0px + TILE;
              // compute intersection area between seeker bbox and tile rect
              const ix0 = Math.max(bx0, tx0px);
              const iy0 = Math.max(by0, ty0px);
              const ix1 = Math.min(bx1, tx1px);
              const iy1 = Math.min(by1, ty1px);
              const iw = ix1 - ix0;
              const ih = iy1 - iy0;
              if (iw > 0 && ih > 0) {
                // positive-area overlap -> touching (not just edge contact)
                return true;
              }
            }
          }
        }
        return false;
      }

      function isStuckTile(tx, ty) {
        const up = isWallAt(collision, tx, ty - 1);
        const down = isWallAt(collision, tx, ty + 1);
        const left = isWallAt(collision, tx - 1, ty);
        const right = isWallAt(collision, tx + 1, ty);
        return up && down && left && right;
      }

      function hasAdjacentFree(tx, ty) {
        const neighbors = [
          { x: tx, y: ty - 1 },
          { x: tx, y: ty + 1 },
          { x: tx - 1, y: ty },
          { x: tx + 1, y: ty },
        ];
        for (const n of neighbors) {
          if (n.y >= 0 && n.y < mapRows && n.x >= 0 && n.x < mapCols) {
            if (collision[n.y][n.x] === 0) return true;
          }
        }
        return false;
      }

      function setKeyState(e, value) {
        const k = (e.key || "").toLowerCase();
        if (k === "arrowup") keys.arrowup = value;
        else if (k === "arrowdown") keys.arrowdown = value;
        else if (k === "arrowleft") keys.arrowleft = value;
        else if (k === "arrowright") keys.arrowright = value;
        else if (k === "w") keys.w = value;
        else if (k === "a") keys.a = value;
        else if (k === "s") keys.s = value;
        else if (k === "d") keys.d = value;
      }

      // prevent arrow keys from scrolling the page and ensure key state is set
      document.addEventListener(
        "keydown",
        (e) => {
          const k = (e.key || "").toLowerCase();
          if (k.startsWith("arrow")) e.preventDefault();
          setKeyState(e, true);
        },
        { passive: false },
      );

      document.addEventListener("keyup", (e) => {
        setKeyState(e, false);
      });

      img.onload = () => {
        const result = buildCollisionGrid(img, TILE);
        collision = result.grid;
        mapCols = result.cols;
        mapRows = result.rows;

        canvas.width = img.width;
        canvas.height = img.height;
        canvas.style.width = canvas.width * VISUAL_SCALE_X + "px";
        canvas.style.height = canvas.height + "px";

        // 1) try top-left preferred area for a free, non-stuck tile with adjacent free and not overlapping walls
        let found = false;
        const preferCols = Math.min(PREFER_COLS, mapCols);
        const preferRows = Math.min(PREFER_ROWS, mapRows);

        for (let y = 0; y < preferRows && !found; y++) {
          for (let x = 0; x < preferCols; x++) {
            if (
              collision[y][x] === 0 &&
              !isStuckTile(x, y) &&
              hasAdjacentFree(x, y)
            ) {
              const candidateX = x * TILE + TILE / 2;
              const candidateY = y * TILE + TILE / 2;
              if (!isTouchingWall(candidateX, candidateY)) {
                posX = candidateX;
                posY = candidateY;
                found = true;
                break;
              }
            }
          }
        }

        // 2) fallback: first free, non-stuck, non-overlapping tile anywhere
        if (!found) {
          outer: for (let y = 0; y < mapRows; y++) {
            for (let x = 0; x < mapCols; x++) {
              if (
                collision[y][x] === 0 &&
                !isStuckTile(x, y) &&
                hasAdjacentFree(x, y)
              ) {
                const candidateX = x * TILE + TILE / 2;
                const candidateY = y * TILE + TILE / 2;
                if (!isTouchingWall(candidateX, candidateY)) {
                  posX = candidateX;
                  posY = candidateY;
                  found = true;
                  break outer;
                }
              }
            }
          }
        }

        // 3) final fallback: any free tile (center)
        if (!found) {
          outer2: for (let y = 0; y < mapRows; y++) {
            for (let x = 0; x < mapCols; x++) {
              if (collision[y][x] === 0) {
                posX = x * TILE + TILE / 2;
                posY = y * TILE + TILE / 2;
                break outer2;
              }
            }
          }
        }

        triangleSeeker.style.zIndex = 50;

        function loop() {
          let dx = 0,
            dy = 0;
          let rotation = null;
          let moving = false;

          // movement supports arrows + WASD
          if ((keys.arrowup || keys.w) && (keys.arrowright || keys.d)) {
            dy -= SEEKER_SPEED;
            dx += SEEKER_SPEED;
            rotation = 45;
            compassSeeker.textContent = "UP RIGHT";
            moving = true;
          } else if ((keys.arrowup || keys.w) && (keys.arrowleft || keys.a)) {
            dy -= SEEKER_SPEED;
            dx -= SEEKER_SPEED;
            rotation = -45;
            compassSeeker.textContent = "UP LEFT";
            moving = true;
          } else if (
            (keys.arrowdown || keys.s) &&
            (keys.arrowright || keys.d)
          ) {
            dy += SEEKER_SPEED;
            dx += SEEKER_SPEED;
            rotation = 135;
            compassSeeker.textContent = "DOWN RIGHT";
            moving = true;
          } else if ((keys.arrowdown || keys.s) && (keys.arrowleft || keys.a)) {
            dy += SEEKER_SPEED;
            dx -= SEEKER_SPEED;
            rotation = -135;
            compassSeeker.textContent = "DOWN LEFT";
            moving = true;
          } else if (keys.arrowup || keys.w) {
            dy -= SEEKER_SPEED;
            rotation = 0;
            compassSeeker.textContent = "UP";
            moving = true;
          } else if (keys.arrowdown || keys.s) {
            dy += SEEKER_SPEED;
            rotation = 180;
            compassSeeker.textContent = "DOWN";
            moving = true;
          } else if (keys.arrowleft || keys.a) {
            dx -= SEEKER_SPEED;
            rotation = -90;
            compassSeeker.textContent = "LEFT";
            moving = true;
          } else if (keys.arrowright || keys.d) {
            dx += SEEKER_SPEED;
            rotation = 90;
            compassSeeker.textContent = "RIGHT";
            moving = true;
          } else {
            compassSeeker.textContent = "IDLE";
          }

          let proposedX = posX + dx;
          let proposedY = posY + dy;

          const clamped = clampToCanvas(proposedX, proposedY);
          proposedX = clamped.x;
          proposedY = clamped.y;

          // Use touch-only overlap check
          if (!isTouchingWall(proposedX, proposedY)) {
            posX = proposedX;
            posY = proposedY;
            if (moving && rotation !== null) createTrail(posX, posY, rotation);
          } else {
            // sliding: try X-only then Y-only using same touch-only rule
            let moved = false;
            const tryX = { x: posX + dx, y: posY };
            const tryY = { x: posX, y: posY + dy };

            if (!isTouchingWall(tryX.x, tryX.y)) {
              posX = tryX.x;
              moved = true;
            }
            if (!moved && !isTouchingWall(tryY.x, tryY.y)) {
              posY = tryY.y;
              moved = true;
            }

            const cl = clampToCanvas(posX, posY);
            posX = cl.x;
            posY = cl.y;

            if (moved && moving && rotation !== null)
              createTrail(posX, posY, rotation);
          }

          if (posX >= SCROLL_TRIGGER_X || posY >= SCROLL_TRIGGER_Y) {
            const desired = Math.min(
              canvas.height - window.innerHeight,
              Math.max(0, posY - SCROLL_TRIGGER_Y + SCROLL_AMOUNT),
            );
            targetScrollY = desired;
          } else {
            targetScrollY = 0;
          }

          scrollY += (targetScrollY - scrollY) * SCROLL_LERP;

          canvas.style.transform = `translateY(${-scrollY}px) scaleX(${VISUAL_SCALE_X})`;
          triangleSeeker.style.left = posX * VISUAL_SCALE_X + "px";
          triangleSeeker.style.top = posY - scrollY + "px";

          if (rotation !== null) {
            lastRotation = rotation;
            triangleSeeker.style.transform = `translate(-50%,-50%) rotate(${rotation}deg) scale(${moving ? 1.15 : 1})`;
          } else {
            triangleSeeker.style.transform = `translate(-50%,-50%) rotate(${lastRotation}deg) scale(1)`;
          }

          drawMazeGrid(collision);
          coordsSeeker.textContent = `X: ${Math.round(posX)}, Y: ${Math.round(posY)}`;
          requestAnimationFrame(loop);
        }

        loop();
      };

      img.onerror = () => {
        canvas.width = 640;
        canvas.height = 480;
        collision = Array.from(
          { length: Math.floor(canvas.height / TILE) },
          () => Array(Math.floor(canvas.width / TILE)).fill(0),
        );
        drawMazeGrid(collision);
        requestAnimationFrame(function fallbackLoop() {
          requestAnimationFrame(fallbackLoop);
        });
      };
    </script>
  </body>
</html>
