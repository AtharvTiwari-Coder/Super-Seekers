<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Super Seekers - Start</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Intro Video -->
    <video id="introVideo" autoplay muted playsinline>
      <source src="Videos/MainMIntro.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>

    <!-- Background Audio -->
    <audio id="bgAudio" src="Audios/MainMLoopA.mp3" loop></audio>

    <!-- Audio Toggle Button (only control for audio) -->
    <button id="audioToggle" class="audio-btn" aria-label="Toggle audio">
      🔊
    </button>

    <!-- Heading + Menu -->
    <div id="menuContainer" style="display: none">
      <h1 id="gameTitle">SUPER SEEKERS</h1>
      <div id="menu" class="menu">
        <button class="play-btn" onclick="startGame()">Play</button>
        <button class="settings-btn" onclick="openSettings()">Settings</button>
        <button class="exit-btn" onclick="exitGame()">Exit</button>
      </div>
      <footer id="footerText">MADE BY ❤️ FROM ABHIRAJ AND ATHARV</footer>
    </div>

    <script>
      const video = document.getElementById("introVideo");
      const audio = document.getElementById("bgAudio");
      const audioToggle = document.getElementById("audioToggle");
      const menuContainer = document.getElementById("menuContainer");

      video.onended = () => {
        menuContainer.style.display = "block";
      };

      audioToggle.onclick = () => {
        audio.muted = !audio.muted;
        audioToggle.textContent = audio.muted ? "🔇" : "🔊";
      };

      function startGame() {
        window.location.href = "Game/Game.html";
      }

      function openSettings() {
        window.location.href = "Settings/Settings.html";
      }

      function exitGame() {
        window.location.href = "https://www.google.com";
      }
    </script>
  </body>
</html>
