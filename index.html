<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Super Seekers - Start</title>
  <link rel="stylesheet" href="GameStyle.css" />
</head>
<body>
  <!-- Intro Video (no controls) -->
  <video id="introVideo" autoplay muted playsinline preload="auto">
    <source src="Videos/MainMIntro.mp4" type="video/mp4" />
    Your browser does not support the video tag.
  </video>

  <!-- Background Audio (loop) -->
  <audio id="bgAudio" src="Audios/MainMLoopA.mp3" loop preload="auto"></audio>

  <!-- Audio Toggle Button -->
  <button id="audioToggle" class="audio-btn" aria-label="Toggle audio">🔊</button>

  <!-- Centered Title + Menu -->
  <div id="menuContainer" class="menu-container" aria-hidden="true">
    <h1 id="gameTitle" class="neon-title">SUPER SEEKERS</h1>

    <div id="menu" class="menu">
      <button class="menu-btn play-btn" onclick="startGame()">PLAY</button>
      <button class="menu-btn settings-btn" onclick="openSettings()">SETTINGS</button>
      <button class="menu-btn exit-btn" onclick="exitGame()">EXIT</button>
    </div>

    <footer id="footerText" class="neon-footer">MADE BY ❤️ FROM ABHIRAJ AND ATHARV</footer>
  </div>

  <script src="GameScript.js"></script>
</body>
</html>
